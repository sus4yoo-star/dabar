name: Weekly Code Review

# 매주 월요일 오전 9시(KST, UTC+9) = UTC 0시에 자동 실행
on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:  # 수동 실행용

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set date (KST)
        run: echo "DATE=$(TZ=Asia/Seoul date '+%Y-%m-%d')" >> $GITHUB_ENV

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create branch from main
        run: |
          git checkout main
          git pull origin main
          git checkout -b reports/weekly-${{ env.DATE }}

      - name: Generate weekly report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx tsx scripts/weekly-review.ts

      - name: Commit and push report
        run: |
          git add reports/weekly-${{ env.DATE }}.md
          git commit -m "리포트: 주간 코드 점검 ${{ env.DATE }}"
          git push -u origin reports/weekly-${{ env.DATE }}

      - name: Create Pull Request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "주간 코드 점검 리포트 (${{ env.DATE }})" \
            --body "$(cat <<'EOF'
          ## 다바르(DABAR) 주간 코드 점검

          매주 월요일 자동 생성되는 코드 품질 점검 리포트입니다.

          📄 **리포트 파일:** \`reports/weekly-${{ env.DATE }}.md\`

          리포트를 검토 후 이 PR을 main에 병합하면 기록이 저장됩니다.

          ---
          *자동화 AI 시스템 생성*
          EOF
          )" \
            --base main \
            --head reports/weekly-${{ env.DATE }}
