name: Generate Questions

# 노트북이 꺼져 있어도 GitHub 클라우드 서버에서 문제 생성을 돌립니다.
# 수동 실행(workflow_dispatch)으로만 시작되며, 스크립트는 재개 가능하므로
# 이미 만든 문제는 건너뛰고 부족한 것만 채웁니다.
on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # GitHub 작업 최대 6시간 한도 안쪽
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22   # Supabase 클라이언트가 Node 22+ 의 기본 WebSocket 을 필요로 함
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate questions
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        # ts-node 는 CI(Node 20 ESM)에서 .ts 확장자를 못 읽으므로 tsx 로 실행
        run: npx tsx scripts/generate-questions.ts
