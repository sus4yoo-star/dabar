name: 오늘의 말씀 매일 푸시

# 매일 오전 8시(KST) = 23:00 UTC 에 라이브 사이트의 발송 엔드포인트를 호출한다.
# 필요 설정(1회):
#   1) Netlify 환경변수: CRON_SECRET(임의 문자열), SUPABASE_SERVICE_ROLE_KEY(Supabase 설정에서 복사)
#   2) GitHub 저장소 Secrets: CRON_SECRET (Netlify 와 같은 값)
#      Settings → Secrets and variables → Actions → New repository secret
on:
  schedule:
    - cron: "0 23 * * *"   # 08:00 KST (UTC+9)
  workflow_dispatch: {}    # 수동 실행(테스트)도 가능

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: 오늘의 말씀 발송
        run: |
          # -f 를 빼서 실패 시에도 서버 응답 본문(원인)을 볼 수 있게 한다.
          body=$(curl -sS -X POST "https://dabar.theamov.com/api/push/daily" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -w $'\nHTTP %{http_code}')
          echo "$body"
          echo "$body" | grep -q "HTTP 200" || { echo "::error::daily push failed"; exit 1; }
