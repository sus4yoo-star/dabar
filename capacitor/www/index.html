<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>DABAR</title>
  <style>
    :root { color-scheme: light; }
    html, body { margin: 0; height: 100%; background: #ffffff; }
    .wrap {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px; background: #ffffff;
      font-family: 'Iowan Old Style','Apple Garamond',Georgia,'Times New Roman','Noto Serif KR',serif;
    }
    /* 브랜드 마크(펼친 책 + 빛) — 앱과 동일한 골드 라인, 정중앙 */
    svg { display: block; }
    .word { font-size: 22px; font-weight: 700; color: #b8901f; letter-spacing: 6px; padding-left: 6px; }
    .spin {
      width: 22px; height: 22px; margin-top: 6px; border-radius: 50%;
      border: 2px solid rgba(184,144,31,.25); border-top-color: #b8901f;
      animation: r .8s linear infinite;
    }
    .msg { display: none; font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; font-size: 13px; color: #54718a; }
    @keyframes r { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) { .spin { animation: none; } }
  </style>
</head>
<body>
  <div class="wrap">
    <svg width="92" height="92" viewBox="0 -5 64 64" fill="none" aria-hidden="true"
      stroke="#b8901f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M32 6c.4 2.7.8 3.1 3.5 3.5-2.7.4-3.1.8-3.5 3.5-.4-2.7-.8-3.1-3.5-3.5 2.7-.4 3.1-.8 3.5-3.5z" fill="#b8901f" stroke-width="0.4" />
      <path d="M32 24V48" />
      <path d="M32 24C25 20 17 19 10 21.5C12 29 12 39.5 10 45C17 42.5 25 43.5 32 48" />
      <path d="M32 24C39 20 47 19 54 21.5C52 29 52 39.5 54 45C47 42.5 39 43.5 32 48" />
    </svg>
    <div class="word">DABAR</div>
    <div class="spin" id="spin"></div>
    <div class="msg" id="msg">인터넷 연결을 확인해 주세요</div>
  </div>
  <script>
    // 오프라인이면 스피너 대신 안내 문구 표시(원격 URL 로드 실패 시의 폴백 화면).
    if (!navigator.onLine) {
      document.getElementById('spin').style.display = 'none';
      document.getElementById('msg').style.display = 'block';
    }
  </script>
</body>
</html>
